version: "3.9"

networks:
  kutahya-net:
    driver: bridge

volumes:
  pg_data:
  redis_data:
  kafka_data:
  zookeeper_data:

services:
  # ── PostgreSQL ──────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    networks:
      - kutahya-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ───────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - kutahya-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ── Zookeeper (required by Kafka) ───────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    volumes:
      - zookeeper_data:/var/lib/zookeeper
    networks:
      - kutahya-net

  # ── Kafka ───────────────────────────────────────────────────
  kafka:
    image: confluentinc/cp-kafka:7.6.0
    restart: unless-stopped
    depends_on:
      - zookeeper
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    volumes:
      - kafka_data:/var/lib/kafka
    ports:
      - "9092:9092"
    networks:
      - kutahya-net
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "kafka:9092", "--list"]
      interval: 15s
      timeout: 10s
      retries: 10

  # ── MailHog (mock SMTP) ─────────────────────────────────────
  mailhog:
    image: mailhog/mailhog:latest
    restart: unless-stopped
    ports:
      - "1025:1025"   # SMTP
      - "8025:8025"   # Web UI
    networks:
      - kutahya-net

  # ── Auth Service ───────────────────────────────────────────
  auth-service:
    build: ./services/auth-service
    restart: unless-stopped
    env_file: .env
    environment:
      DB_NAME: ${AUTH_DB_NAME}
      SERVICE_PORT: 8001
    ports:
      - "8001:8001"
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - kutahya-net
    volumes:
      - ./shared:/shared

  # ── Trip Service ───────────────────────────────────────────
  trip-service:
    build: ./services/trip-service
    restart: unless-stopped
    env_file: .env
    environment:
      DB_NAME: ${TRIP_DB_NAME}
      SERVICE_PORT: 8003
    ports:
      - "8003:8003"
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - kutahya-net
    volumes:
      - ./shared:/shared
  user-service:
    build: ./services/user-service
    restart: unless-stopped
    env_file: .env
    environment:
      DB_NAME: ${USER_DB_NAME}
      SERVICE_PORT: 8002
    ports:
      - "8002:8002"
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - kutahya-net
    volumes:
      - ./shared:/shared

  # ── Payment Service ────────────────────────────────────────
  payment-service:
    build: ./services/payment-service
    restart: unless-stopped
    env_file: .env
    environment:
      DB_NAME: ${PAYMENT_DB_NAME}
      SERVICE_PORT: 8005
    ports:
      - "8005:8005"
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - kutahya-net
    volumes:
      - ./shared:/shared

  # ── Booking Service ────────────────────────────────────────
  booking-service:
    build: ./services/booking-service
    restart: unless-stopped
    env_file: .env
    environment:
      DB_NAME: ${BOOKING_DB_NAME}
      SERVICE_PORT: 8004
      TRIP_SERVICE_HOST: trip-service
      PAYMENT_SERVICE_HOST: payment-service
    ports:
      - "8004:8004"
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      trip-service:
        condition: service_started
      payment-service:
        condition: service_started
    networks:
      - kutahya-net
    volumes:
      - ./shared:/shared

  # ── Notification Service ───────────────────────────────────
  notification-service:
    build: ./services/notification-service
    restart: unless-stopped
    env_file: .env
    ports:
      - "8006:8006"
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - kutahya-net
    volumes:
      - ./shared:/shared

  # ── API Gateway ────────────────────────────────────────────
  api-gateway:
    build: ./services/api-gateway
    restart: unless-stopped
    ports:
      - "8000:80"
    depends_on:
      - auth-service
      - user-service
      - trip-service
      - booking-service
      - payment-service
    networks:
      - kutahya-net

  # ── Frontend ──────────────────────────────────────────────
  frontend:
    build: ./frontend
    restart: unless-stopped
    environment:
      PUBLIC_API_BASE_URL: http://api-gateway:80
    ports:
      - "3000:3000"
    depends_on:
      - api-gateway
    networks:
      - kutahya-net
