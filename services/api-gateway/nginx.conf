upstream auth_service    { server auth-service:8001; }
upstream user_service    { server user-service:8002; }
upstream trip_service    { server trip-service:8003; }
upstream booking_service { server booking-service:8004; }
upstream payment_service { server payment-service:8005; }

server {
    listen 80;
    server_name _;

    # Rate limiting
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/m;
    limit_req zone=api burst=10 nodelay;

    location /api/v1/auth/     { proxy_pass http://auth_service; }
    location /api/v1/users/    { proxy_pass http://user_service; }
    location /api/v1/trips/    { proxy_pass http://trip_service; }
    location /api/v1/routes/   { proxy_pass http://trip_service; }
    location /api/v1/buses/    { proxy_pass http://trip_service; }
    location /api/v1/bookings/ { proxy_pass http://booking_service; }
    location /api/v1/payments/ { proxy_pass http://payment_service; }

    location /health {
        add_header Content-Type application/json;
        return 200 '{"status":"ok","gateway":"kutahyalilar"}';
    }
}
