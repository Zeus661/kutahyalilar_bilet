apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: kutahyalilar
spec:
  replicas: 2
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
    spec:
      containers:
        - name: auth-service
          image: kutahyalilar/auth-service:latest
          ports:
            - containerPort: 8001
          envFrom:
            - configMapRef:
                name: kutahyalilar-config
            - secretRef:
                name: kutahyalilar-secrets
          readinessProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 30
            periodSeconds: 10
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: auth-service
  namespace: kutahyalilar
spec:
  selector:
    app: auth-service
  ports:
    - port: 8001
      targetPort: 8001
